name: Build ZMK firmware
on:
  workflow_dispatch:
  push:
    paths-ignore:
      - "keymap-drawer/**"

jobs:
  build:
    # Pinned to same SHA as the ZMK revision in config/west.yml. The workflow
    # at @main uses west features (e.g. `west boards --format {qualifiers}`)
    # that don't exist in the older pinned ZMK.
    uses: zmkfirmware/zmk/.github/workflows/build-user-config.yml@abb64ba316c29caddc49727ca2cac2f0ed5970c7
